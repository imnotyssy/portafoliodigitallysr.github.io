  <script>
    (function () {
      const pages = ['sobre-mi.html', 'cursos.html', 'habilidades.html', 'tesis.html', 'contacto.html'];
      const current = window.location.pathname.split('/').pop() || 'sobre-mi.html';
      const index = pages.indexOf(current);
      if (index === -1) return;
      const prev = document.querySelector('[data-prev]');
      const next = document.querySelector('[data-next]');
      const setState = (el, href, disabled) => {
        if (!el) return;
        if (disabled) {
          el.href = '#';
          el.classList.add('is-disabled');
          el.setAttribute('aria-disabled', 'true');
        } else {
          el.href = href;
          el.classList.remove('is-disabled');
          el.removeAttribute('aria-disabled');
        }
      };
      setState(prev, pages[index - 1], index === 0);
      setState(next, pages[index + 1], index === pages.length - 1);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowLeft' && index > 0) window.location.href = pages[index - 1];
        if (e.key === 'ArrowRight' && index < pages.length - 1) window.location.href = pages[index + 1];
      });
    })();
  </script>
